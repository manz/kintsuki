name: ci

on:
  push:
    branches: [master]
  pull_request:

# Hatch reads $VERSION at wheel-build time (see [tool.hatch.version]).
# CI is non-tag, so use a dev marker.
env:
  VERSION: 0.0.0.dev0

jobs:
  build-and-test:
    name: ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26            # Apple Silicon, Xcode 17 toolchain
            lib: libkintsuki.dylib
            python: "3.13"
          - os: ubuntu-24.04-arm    # public arm64 Linux runner
            lib: libkintsuki.so
            python: "3.13"

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build ccache build-essential

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja ccache

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: python/uv.lock

      - name: Configure + build libkintsuki
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          ninja -C build kintsuki

      - name: Stage native library into the wheel
        run: make python-stage

      - name: Install dev environment (kintsuki + a816 + pytest)
        working-directory: python
        run: uv sync --group dev --python ${{ matrix.python }}

      - name: Assemble test ROM
        working-directory: python
        run: uv run a816 -f sfc -o tests/asm/test_rom.sfc tests/asm/test_rom.s

      - name: Run tests against built ROM
        working-directory: python
        env:
          KINTSUKI_TEST_ROM: ${{ github.workspace }}/python/tests/asm/test_rom.sfc
        run: uv run pytest tests/ -v
