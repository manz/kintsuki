name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Hatch reads the package version from $VERSION at build time
# (see [tool.hatch.version] in python/pyproject.toml). github.ref_name is
# the tag name, e.g. 'v0.1.0'; packaging normalizes the leading 'v' away
# so it lands on PyPI as '0.1.0'.
env:
  VERSION: ${{ github.ref_name }}

jobs:
  build-wheel:
    name: wheel ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
            lib: libkintsuki.dylib
            plat_tag: macosx_11_0_arm64
          - os: ubuntu-24.04-arm
            lib: libkintsuki.so
            plat_tag: manylinux_2_28_aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build build-essential patchelf

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Configure + build libkintsuki
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          ninja -C build kintsuki

      - name: Install hatch
        run: python -m pip install --upgrade pip hatch wheel

      - name: Build wheel
        run: make wheels

      - name: Retag wheel as platform-specific
        working-directory: python
        run: |
          python -m wheel tags \
            --platform-tag ${{ matrix.plat_tag }} \
            --python-tag py3 \
            --abi-tag none \
            --remove \
            dist/*.whl

      - name: Audit wheel (Linux)
        if: runner.os == 'Linux'
        working-directory: python
        run: |
          python -m pip install auditwheel
          # auditwheel rewrites the wheel to a manylinux tag based on glibc
          # symbols actually used. If it bumps the tag, replace the wheel.
          auditwheel show dist/*.whl || true
          auditwheel repair --plat ${{ matrix.plat_tag }} -w dist/repaired dist/*.whl || true
          if compgen -G "dist/repaired/*.whl" > /dev/null; then
            rm -f dist/*.whl
            mv dist/repaired/*.whl dist/
            rmdir dist/repaired || true
          fi

      - name: Audit wheel (macOS)
        if: runner.os == 'macOS'
        working-directory: python
        run: |
          python -m pip install delocate
          delocate-listdeps dist/*.whl || true
          delocate-wheel -w dist/repaired -v dist/*.whl || true
          if compgen -G "dist/repaired/*.whl" > /dev/null; then
            rm -f dist/*.whl
            mv dist/repaired/*.whl dist/
            rmdir dist/repaired || true
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: python/dist/*.whl

  publish-github:
    name: attach wheels to GitHub release
    needs: build-wheel
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Attach wheels to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.whl

  publish-pypi:
    name: publish to PyPI
    needs: build-wheel
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install hatch
        run: python -m pip install hatch

      - name: Publish wheels via hatch
        env:
          HATCH_INDEX_USER: ${{ secrets.HATCH_INDEX_USER }}
          HATCH_INDEX_AUTH: ${{ secrets.HATCH_INDEX_AUTH }}
        run: hatch publish dist/*.whl
