name: Kintsuki
options:
  bundleIdPrefix: net.ringum
  deploymentTarget:
    macOS: "26.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    ONLY_ACTIVE_ARCH: YES
    ARCHS: arm64
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    # Hardened runtime triggers Team-ID library validation on every load,
    # which rejects the locally-built ad-hoc libkintsuki.dylib. We only
    # want hardened-runtime for release distribution (notarization), and
    # this app isn't there yet — disable for both Debug and Release so
    # `instruments` against a Release build just works.
    ENABLE_HARDENED_RUNTIME: NO
    # Keep symbols + dSYMs in Release so Instruments call trees show
    # function names instead of raw addresses. Optimizer stays at -O.
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    DEPLOYMENT_POSTPROCESSING: NO
    STRIP_INSTALLED_PRODUCT: NO
    COPY_PHASE_STRIP: NO

targets:
  Kintsuki:
    type: application
    platform: macOS
    sources:
      - path: Sources/Kintsuki
      - path: Sources/CKintsuki
    info:
      path: Resources/Info.plist
      properties:
        CFBundleIdentifier: net.ringum.kintsuki
        CFBundleName: Kintsuki
        CFBundleDisplayName: Kintsuki
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHumanReadableCopyright: "© 2026 ringum"
        CFBundleDocumentTypes:
          - CFBundleTypeName: SNES ROM
            CFBundleTypeRole: Viewer
            LSItemContentTypes:
              - public.data
            CFBundleTypeExtensions:
              - sfc
              - smc
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.ringum.kintsuki
        PRODUCT_NAME: Kintsuki
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        # CKintsuki module map + libkintsuki.dylib live in Vendor/.
        SWIFT_INCLUDE_PATHS: $(SRCROOT)/Sources/CKintsuki
        LIBRARY_SEARCH_PATHS:
          - $(SRCROOT)/Vendor
        OTHER_LDFLAGS: -lkintsuki
        # @rpath for the embedded dylib; install_name_tool fixes the load
        # path during the embed-copy build phase below.
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
    dependencies:
      - sdk: MetalKit.framework
      - sdk: Metal.framework
      - sdk: CoreGraphics.framework
      - sdk: AppKit.framework
    preBuildScripts:
      - name: Build libkintsuki + sync System pak
        basedOnDependencyAnalysis: false
        script: |
          set -e
          # Xcode strips /opt/homebrew from PATH, so resolve cmake/ninja
          # by absolute path. We don't depend on PATH being set right.
          CMAKE=""
          for c in /opt/homebrew/bin/cmake /usr/local/bin/cmake /usr/bin/cmake; do
            [ -x "$c" ] && { CMAKE="$c"; break; }
          done
          if [ -z "$CMAKE" ]; then
            echo "error: cmake not found (tried /opt/homebrew, /usr/local, /usr/bin)" >&2
            echo "install with: brew install cmake ninja" >&2
            exit 1
          fi
          export PATH="$(dirname "$CMAKE"):$PATH"
          REPO="$SRCROOT/.."
          if [ ! -d "$REPO/build" ]; then
            "$CMAKE" -S "$REPO" -B "$REPO/build" -G Ninja \
              -DCMAKE_C_COMPILER=/usr/bin/clang \
              -DCMAKE_CXX_COMPILER=/usr/bin/clang++
          fi
          "$CMAKE" --build "$REPO/build" --target kintsuki
          mkdir -p "$SRCROOT/Vendor"
          cp "$REPO/build/ares/target-kintsuki/libkintsuki.dylib" "$SRCROOT/Vendor/"
          # ares System/ pak (boards.bml + ipl.rom) lives next to the dylib
          # so the bundle copy phase ships it as a Resource.
          rsync -a --delete "$REPO/ares/ares/System/" "$SRCROOT/Vendor/System/"
          # Fix install_name to @rpath for embedded loading.
          install_name_tool -id @rpath/libkintsuki.dylib "$SRCROOT/Vendor/libkintsuki.dylib" || true
          # install_name_tool mutates the dylib in-place so any ad-hoc
          # signature embedded by the linker no longer covers the
          # current bytes. Re-sign here so the staged Vendor/ copy is
          # already valid before the bundle-embed phase.
          /usr/bin/codesign --force --sign - "$SRCROOT/Vendor/libkintsuki.dylib" || true
    postBuildScripts:
      - name: Embed libkintsuki + System pak into bundle
        basedOnDependencyAnalysis: false
        script: |
          set -e
          mkdir -p "$TARGET_BUILD_DIR/$FRAMEWORKS_FOLDER_PATH"
          cp "$SRCROOT/Vendor/libkintsuki.dylib" \
             "$TARGET_BUILD_DIR/$FRAMEWORKS_FOLDER_PATH/"
          # ares System pak (boards.bml + ipl.rom). Emulator.swift sets
          # KINTSUKI_SYSTEM_PAK from Bundle.main.resourcePath at startup.
          mkdir -p "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH"
          rsync -a --delete "$SRCROOT/Vendor/System/" \
             "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/System/"
          # The dylib copied in from Vendor/ may carry a stale ad-hoc
          # signature: install_name_tool ran in the prebuild script
          # invalidates whatever signature was embedded by the linker.
          # Re-sign with the same identity Xcode uses for the .app so
          # the launching process and the loaded dylib share a Team ID
          # (Debug = "-", Release = "Apple Development:..." etc).
          # Generate a sibling .dSYM for the embedded dylib so Instruments
          # can symbolicate the libkintsuki call tree alongside the Swift
          # app's own dSYM. cmake produces DWARF in-binary (-g) but no
          # bundle; dsymutil extracts it for the profiler.
          /usr/bin/dsymutil \
             "$TARGET_BUILD_DIR/$FRAMEWORKS_FOLDER_PATH/libkintsuki.dylib" \
             -o "$BUILT_PRODUCTS_DIR/libkintsuki.dylib.dSYM" || true
          IDENTITY="${EXPANDED_CODE_SIGN_IDENTITY:-${CODE_SIGN_IDENTITY:--}}"
          /usr/bin/codesign --force --sign "$IDENTITY" \
             "$TARGET_BUILD_DIR/$FRAMEWORKS_FOLDER_PATH/libkintsuki.dylib"
          /usr/bin/codesign --force --sign "$IDENTITY" \
             --entitlements "$BUILT_PRODUCTS_DIR/$TARGET_NAME.app.xcent" \
             "$TARGET_BUILD_DIR/$WRAPPER_NAME" || true
